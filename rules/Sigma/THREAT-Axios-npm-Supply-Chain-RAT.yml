# ============================================================
# Threat  : Axios npm Supply Chain — Cross-Platform RAT Dropper
# Platform: Sigma (Generic)
# TTPs    : T1195.001 / T1059.001 / T1059.004 / T1059.006 / T1036.005 / T1070.004
# Severity: Critical
# Rules   : 2 consolidated (process spawn + file activity)
# ============================================================

---
# ── RULE 1: Package Manager Spawning Network or Scripting Tool ──
# Covers both Linux (curl/wget/python3/bash) and Windows (wscript/powershell)
# in a single rule. No product constraint — attacker behaviour is OS-agnostic.
# Two AND conditions required: parent identity + child identity.
title: Package Manager Spawning Network or Scripting Tool During Install
id: a1b2c3d4-0001-4e5f-8901-axios001sigma
status: experimental
description: >
  Detects npm or node spawning a network utility or scripting engine as a child
  process. Covers the cross-platform npm supply chain RAT dropper pattern:
  Linux (curl/wget/python3/bash) and Windows (wscript/powershell) vectors.
  Legitimate package installs do not spawn these tools as direct children.
author: TI-DE Detection Engineering
date: 2026-03-31
references:
  - https://www.stepsecurity.io/blog/axios-compromised-on-npm-malicious-versions-drop-remote-access-trojan
tags:
  - attack.t1195.001
  - attack.t1059.001
  - attack.t1059.004
  - attack.t1059.006
logsource:
  category: process_creation
detection:
  selection_parent:
    ParentImage|endswith:
      - '/node'
      - '/npm'
      - '/npm-cli.js'
      - '\node.exe'
      - '\npm.cmd'
  selection_child:
    Image|endswith:
      - '/curl'
      - '/wget'
      - '/python3'
      - '/python'
      - '/bash'
      - '/sh'
      - '/nc'
      - '/ncat'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
  condition: selection_parent and selection_child
falsepositives:
  - Legitimate packages with postinstall hooks invoking system tools (rare)
level: high

---
# ── RULE 2: Node or Scripting Engine Performing Suspicious File Activity ──
# Consolidates: executable/script drop to staging path + anti-forensic cleanup.
# Does NOT match specific filenames — writer process + destination pattern is
# the behavioral signal. Attacker can rename payload but cannot avoid the path.
# Three distinct sub-behaviors joined with OR:
#   a) Executable written to %PROGRAMDATA% by node/scripting engine (Windows)
#   b) Script written to /tmp/ by node (Linux)
#   c) node deleting package.json inside node_modules (evidence destruction)
title: Node or Scripting Engine Dropping Payload or Destroying Evidence
id: a1b2c3d4-0002-4e5f-8901-axios002sigma
status: experimental
description: >
  Detects node or npm-spawned scripting engines performing suspicious file
  operations: dropping an executable to a system staging path (T1036.005),
  writing a script to /tmp (Linux RAT vector), or deleting package.json inside
  node_modules (anti-forensic self-destruct, T1070.004).
author: TI-DE Detection Engineering
date: 2026-03-31
tags:
  - attack.t1036.005
  - attack.t1070.004
  - attack.t1195.001
logsource:
  category: file_event
detection:
  writer_process:
    Image|endswith:
      - '/node'
      - '\node.exe'
      - '\wscript.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
  drop_windows:
    TargetFilename|startswith: 'C:\ProgramData\'
    TargetFilename|endswith: '.exe'
  drop_linux:
    TargetFilename|startswith: '/tmp/'
    TargetFilename|endswith:
      - '.py'
      - '.sh'
  antiforensic:
    TargetFilename|contains: '/node_modules/'
    TargetFilename|endswith: '/package.json'
    FileOperation: 'delete'
  filter_legit:
    Image|startswith:
      - 'C:\Windows\'
      - 'C:\Program Files\'
  condition: writer_process and (drop_windows or drop_linux or antiforensic) and not filter_legit
falsepositives:
  - Legitimate software using node.js to install native modules (verify FolderPath)
level: high
