<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <radialGradient id="li-bg" cx="88%" cy="90%" r="75%">
      <stop offset="0%"   stop-color="#3a0012"/>
      <stop offset="35%"  stop-color="#1a000a"/>
      <stop offset="100%" stop-color="#070810"/>
    </radialGradient>
    <radialGradient id="li-vgn" cx="5%" cy="5%" r="60%">
      <stop offset="0%"   stop-color="#0d1525" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="li-iris" cx="40%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#74d0f7"/>
      <stop offset="38%"  stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#1a4a7a"/>
    </radialGradient>
    <radialGradient id="li-glass" cx="30%" cy="25%" r="70%">
      <stop offset="0%"   stop-color="#fff" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="li-handle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#e8b020"/>
      <stop offset="55%"  stop-color="#b88010"/>
      <stop offset="100%" stop-color="#8a5e08"/>
    </linearGradient>
    <linearGradient id="li-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f8f5ee"/>
      <stop offset="100%" stop-color="#e8e0d0"/>
    </linearGradient>
    <linearGradient id="li-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#e85d04"/>
      <stop offset="100%" stop-color="#f48c06"/>
    </linearGradient>
    <pattern id="li-hatch" patternUnits="userSpaceOnUse" width="12" height="12">
      <rect width="12" height="12" fill="#111828"/>
      <line x1="0" y1="12" x2="12" y2="0" stroke="#1e2d45" stroke-width="1"/>
    </pattern>
    <marker id="li-arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e85d04"/>
    </marker>
    <filter id="li-glow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ═══ ARKA PLAN ═══ -->
  <rect width="1584" height="396" fill="#07080e"/>
  <rect width="1584" height="396" fill="url(#li-bg)"/>
  <rect width="1584" height="396" fill="url(#li-vgn)"/>
  <g opacity=".05" stroke="#c8d8ff" stroke-width="110" stroke-linecap="butt">
    <line x1="-160" y1="-80"  x2="540"  y2="540"/>
    <line x1="160"  y1="-80"  x2="860"  y2="540"/>
    <line x1="480"  y1="-80"  x2="1180" y2="540"/>
    <line x1="800"  y1="-80"  x2="1500" y2="540"/>
  </g>

  <!-- ═══ MASKOT (sağ taraf, scale 2.1) ═══ -->
  <g transform="translate(1234,8) scale(2.1)">

    <!-- Sağ kol (ring arkasında) -->
    <line x1="56" y1="72" x2="115" y2="76" stroke="#c8b090" stroke-width="4" stroke-linecap="round"/>

    <!-- Sap -->
    <line x1="130" y1="73" x2="148" y2="100" stroke="#3a2000" stroke-width="9" stroke-linecap="round" opacity=".28"/>
    <line x1="128" y1="72" x2="146" y2="99" stroke="url(#li-handle)" stroke-width="7" stroke-linecap="round"/>
    <line x1="126" y1="72" x2="138" y2="91" stroke="#f0d060" stroke-width="1.3" stroke-linecap="round" opacity=".42"/>

    <!-- Halka -->
    <circle cx="100" cy="44" r="37" fill="none" stroke="#3a2000" stroke-width="10" opacity=".28"/>
    <circle cx="100" cy="44" r="37" fill="none" stroke="#7a5600" stroke-width="9"/>
    <circle cx="100" cy="44" r="37" fill="none" stroke="#c8941a" stroke-width="7"/>
    <path d="M78 22 A37 37 0 0 1 122 22" fill="none" stroke="#f5dc60" stroke-width="2.2" stroke-linecap="round" opacity=".55"/>

    <!-- Göz -->
    <circle cx="100" cy="44" r="30" fill="#f9f9f9"/>
    <circle cx="100" cy="44" r="22" fill="url(#li-iris)"/>
    <circle cx="100" cy="44" r="17" fill="none" stroke="#1a4a7a" stroke-width=".7" opacity=".3"/>
    <circle cx="100" cy="44" r="13" fill="none" stroke="#1a4a7a" stroke-width=".6" opacity=".2"/>
    <g stroke="#144870" stroke-width=".8" opacity=".35">
      <line x1="100" y1="22"  x2="100" y2="29"/>
      <line x1="100" y1="59"  x2="100" y2="66"/>
      <line x1="63"  y1="44"  x2="70"  y2="44"/>
      <line x1="130" y1="44"  x2="137" y2="44"/>
      <line x1="74"  y1="18"  x2="79"  y2="23"/>
      <line x1="117" y1="61"  x2="122" y2="66"/>
      <line x1="74"  y1="66"  x2="79"  y2="61"/>
      <line x1="117" y1="23"  x2="122" y2="18"/>
    </g>
    <!-- Animasyonlu göz bebeği -->
    <circle cx="100" cy="44" r="11" fill="#050510">
      <animate attributeName="cx" values="100;88;100;112;100" keyTimes="0;0.25;0.45;0.7;1" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
      <animate attributeName="r" values="11;15;11;8;11" keyTimes="0;0.3;0.55;0.8;1" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
    </circle>
    <circle cx="103" cy="40" r="3.5" fill="#fff" opacity=".88">
      <animate attributeName="cx" values="103;91;103;115;103" keyTimes="0;0.25;0.45;0.7;1" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
      <animate attributeName="r" values="3.5;5;3.5;2.5;3.5" keyTimes="0;0.3;0.55;0.8;1" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
    </circle>
    <circle cx="88" cy="33" r="2" fill="#fff" opacity=".4"/>
    <circle cx="100" cy="44" r="30" fill="url(#li-glass)"/>

    <!-- Karakter gövdesi -->
    <ellipse cx="42" cy="150" rx="18" ry="3" fill="#000" opacity=".1"/>
    <line x1="36" y1="98" x2="31" y2="140" stroke="#2a2a2a" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="23" y1="140" x2="34" y2="140" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
    <line x1="48" y1="98" x2="53" y2="140" stroke="#2a2a2a" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="50" y1="140" x2="62" y2="140" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
    <!-- Suit -->
    <rect x="28" y="58" width="28" height="40" rx="3" fill="url(#li-body)" stroke="#c0b090" stroke-width=".8"/>
    <path d="M42 58 L37 65 L42 62 L47 65 L42 58" fill="#c8c0b0" opacity=".45"/>
    <circle cx="42" cy="69" r="1.2" fill="#aaa"/>
    <circle cx="42" cy="76" r="1.2" fill="#aaa"/>
    <circle cx="42" cy="83" r="1.2" fill="#aaa"/>
    <!-- Kravat -->
    <rect x="39" y="58" width="6" height="5" rx="1.5" fill="#111"/>
    <polygon points="39,63 45,63 44,91 42,96 40,91" fill="#1a1a1a"/>
    <!-- Sol kol -->
    <line x1="28" y1="72" x2="17" y2="93" stroke="#c8b090" stroke-width="4" stroke-linecap="round"/>
    <circle cx="16" cy="95" r="4.5" fill="#e5d0a8"/>
    <!-- Sağ el -->
    <ellipse cx="118" cy="76" rx="5.5" ry="3.5" fill="#e5d0a8" transform="rotate(-20,118,76)"/>
    <!-- Baş -->
    <circle cx="42" cy="40" r="18" fill="url(#li-body)" stroke="#c0b090" stroke-width=".8"/>
    <!-- Göz -->
    <ellipse cx="36" cy="38" rx="2.8" ry="2.8" fill="#222"/>
    <circle cx="35" cy="37" r=".9" fill="#fff" opacity=".85"/>
    <path d="M33 34 Q36 32.5 39 34" stroke="#555" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M36 46 Q42 51 48 46" stroke="#666" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="33" cy="44" r="3.5" fill="#ffb0a0" opacity=".25"/>
  </g>

  <!-- ═══ PROFİL FOTOĞRAF ALANI ═══ -->
  <circle cx="195" cy="318" r="78" fill="url(#li-hatch)" stroke="#2e4060" stroke-width="2" stroke-dasharray="8,5"/>
  <text x="195" y="318" text-anchor="middle" dominant-baseline="middle"
        font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#4a6080" opacity=".8">Profil Fotoğrafı</text>

  <!-- Ok -->
  <path d="M 268 285 C 330 240, 395 210, 480 185"
        fill="none" stroke="#e85d04" stroke-width="2.5"
        stroke-linecap="round" stroke-dasharray="7,5"
        marker-end="url(#li-arrow)" opacity=".85"/>

  <!-- ═══ METİN ═══ -->
  <!-- İsim: daha sakin, 50px -->
  <text x="510" y="162"
        font-family="'Segoe UI',Arial Black,sans-serif"
        font-size="50" font-weight="800"
        letter-spacing="2" fill="#ffffff"
        filter="url(#li-glow)">Mazlum BAYDAR</text>

  <!-- Separator -->
  <rect x="510" y="174" width="490" height="3" rx="1.5" fill="url(#li-accent)" opacity=".85"/>

  <!-- Unvan: 24px -->
  <text x="510" y="216"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="24" font-weight="600"
        letter-spacing="1" fill="#e85d04">Sr. Threat Intelligence and</text>
  <text x="510" y="248"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="24" font-weight="600"
        letter-spacing="1" fill="#f48c06">Detection Engineer</text>

  <!-- Alt çizgi -->
  <line x1="510" y1="270" x2="990" y2="270" stroke="#1e2d45" stroke-width="1" opacity=".6"/>

  <!-- Alt etiket -->
  <text x="510" y="300"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="11" letter-spacing="3.5"
        fill="#4a6080" opacity=".65">THREAT INTELLIGENCE  ·  DETECTION ENGINEERING</text>

  <!-- Sol kenar aksanı -->
  <rect x="0" y="0" width="4" height="396" fill="url(#li-accent)" opacity=".7"/>
</svg>
