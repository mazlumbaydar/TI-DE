<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <!-- Background gradient: dark navy → dark crimson glow bottom-right -->
    <radialGradient id="li-bg" cx="88%" cy="90%" r="75%">
      <stop offset="0%"   stop-color="#3a0012"/>
      <stop offset="35%"  stop-color="#1a000a"/>
      <stop offset="100%" stop-color="#070810"/>
    </radialGradient>
    <!-- Secondary subtle top-left vignette -->
    <radialGradient id="li-vgn" cx="5%" cy="5%" r="60%">
      <stop offset="0%"   stop-color="#0d1525" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
    </radialGradient>
    <!-- Eye iris -->
    <radialGradient id="li-iris" cx="40%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#74d0f7"/>
      <stop offset="38%"  stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#1a4a7a"/>
    </radialGradient>
    <!-- Lens glass shine -->
    <radialGradient id="li-glass" cx="30%" cy="25%" r="70%">
      <stop offset="0%"   stop-color="#fff" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <!-- Handle gold -->
    <linearGradient id="li-handle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#e8b020"/>
      <stop offset="55%"  stop-color="#b88010"/>
      <stop offset="100%" stop-color="#8a5e08"/>
    </linearGradient>
    <!-- Character body/skin -->
    <linearGradient id="li-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f8f4ed"/>
      <stop offset="100%" stop-color="#e6ddd0"/>
    </linearGradient>
    <!-- Accent bar gradient -->
    <linearGradient id="li-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#e85d04"/>
      <stop offset="100%" stop-color="#f48c06"/>
    </linearGradient>
    <!-- Profile circle hatching fill -->
    <pattern id="li-hatch" patternUnits="userSpaceOnUse" width="12" height="12">
      <rect width="12" height="12" fill="#111828"/>
      <line x1="0" y1="12" x2="12" y2="0" stroke="#1e2d45" stroke-width="1"/>
    </pattern>
    <!-- Arrow marker -->
    <marker id="li-arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e85d04"/>
    </marker>
    <!-- Text glow filter -->
    <filter id="li-glow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="1584" height="396" fill="#07080e"/>
  <rect width="1584" height="396" fill="url(#li-bg)"/>
  <rect width="1584" height="396" fill="url(#li-vgn)"/>

  <!-- Diagonal light streaks (subtle, matching the original image) -->
  <g opacity=".055" stroke="#c8d8ff" stroke-width="120" stroke-linecap="butt">
    <line x1="-160" y1="-80"  x2="560"  y2="560"/>
    <line x1="160"  y1="-80"  x2="880"  y2="560"/>
    <line x1="480"  y1="-80"  x2="1200" y2="560"/>
    <line x1="800"  y1="-80"  x2="1520" y2="560"/>
  </g>

  <!-- ═══ DETECTIVE CHARACTER (right side, scaled 3x) ═══ -->
  <!-- Character SVG units × 3.05 → displayed ~366×396px, anchored at x=1192, y=0 -->
  <g transform="translate(1192,0) scale(3.05)">

    <!-- Right arm (drawn before ring → appears behind it) -->
    <line x1="36" y1="83" x2="95" y2="79" stroke="#c8b090" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Handle -->
    <line x1="103" y1="75"  x2="117" y2="96"  stroke="#3a2000" stroke-width="8.5" stroke-linecap="round" opacity=".3"/>
    <line x1="101" y1="74"  x2="115" y2="95"  stroke="url(#li-handle)" stroke-width="6.5" stroke-linecap="round"/>
    <line x1="99"  y1="74"  x2="112" y2="93"  stroke="#f0d060" stroke-width="1.2" stroke-linecap="round" opacity=".4"/>

    <!-- Ring -->
    <circle cx="78" cy="50" r="33" fill="none" stroke="#3a2000" stroke-width="10"  opacity=".28"/>
    <circle cx="78" cy="50" r="33" fill="none" stroke="#7a5600" stroke-width="9"/>
    <circle cx="78" cy="50" r="33" fill="none" stroke="#c8941a" stroke-width="7"/>
    <path d="M56 28 A33 33 0 0 1 100 28" fill="none" stroke="#f5dc60" stroke-width="2.2" stroke-linecap="round" opacity=".55"/>

    <!-- Eye -->
    <circle cx="78" cy="50" r="26"  fill="#f9f9f9"/>
    <circle cx="78" cy="50" r="19"  fill="url(#li-iris)"/>
    <circle cx="78" cy="50" r="15"  fill="none" stroke="#1a4a7a" stroke-width=".7" opacity=".3"/>
    <circle cx="78" cy="50" r="11"  fill="none" stroke="#1a4a7a" stroke-width=".6" opacity=".2"/>
    <g stroke="#144870" stroke-width=".7" opacity=".35">
      <line x1="78" y1="31" x2="78" y2="37"/>
      <line x1="78" y1="63" x2="78" y2="69"/>
      <line x1="59" y1="50" x2="65" y2="50"/>
      <line x1="91" y1="50" x2="97" y2="50"/>
      <line x1="66.0" y1="38.0" x2="70.5" y2="42.5"/>
      <line x1="85.5" y1="57.5" x2="90.0" y2="62.0"/>
      <line x1="66.0" y1="62.0" x2="70.5" y2="57.5"/>
      <line x1="85.5" y1="42.5" x2="90.0" y2="38.0"/>
    </g>

    <!-- Animated pupil: looks LEFT → center → RIGHT → center → repeat -->
    <circle cx="78" cy="50" r="9.5" fill="#050510">
      <animate attributeName="cx"
        values="78;67;78;89;78"
        keyTimes="0;0.25;0.45;0.7;1"
        dur="5s" repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
    </circle>
    <circle cx="81" cy="46" r="3.2" fill="#fff" opacity=".88">
      <animate attributeName="cx"
        values="81;70;81;92;81"
        keyTimes="0;0.25;0.45;0.7;1"
        dur="5s" repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
    </circle>
    <circle cx="71" cy="40" r="1.5" fill="#fff" opacity=".4"/>
    <circle cx="78" cy="50" r="26"  fill="url(#li-glass)"/>

    <!-- Foot shadow -->
    <ellipse cx="21" cy="127" rx="13" ry="2.2" fill="#000" opacity=".12"/>

    <!-- Legs & feet -->
    <line x1="18" y1="105" x2="14" y2="124" stroke="#3a3a3a" stroke-width="3"   stroke-linecap="round"/>
    <line x1="26" y1="105" x2="31" y2="124" stroke="#3a3a3a" stroke-width="3"   stroke-linecap="round"/>
    <line x1="9"  y1="124" x2="17" y2="124" stroke="#2a2a2a" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="29" y1="124" x2="38" y2="124" stroke="#2a2a2a" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Shirt -->
    <rect x="8" y="77" width="28" height="28" rx="4" fill="url(#li-body)" stroke="#c0b090" stroke-width=".7"/>
    <circle cx="22" cy="83" r=".9" fill="#aaa"/>
    <circle cx="22" cy="89" r=".9" fill="#aaa"/>
    <circle cx="22" cy="95" r=".9" fill="#aaa"/>
    <polygon points="18,78 24,78 26,100 21,105 16,100" fill="#111"/>
    <polygon points="18,78 24,78 21,83"                 fill="#2d2d2d"/>

    <!-- Left arm -->
    <line x1="8" y1="85" x2="2" y2="99" stroke="#c8b090" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="2" cy="101" r="2.8" fill="#e2cfa8"/>
    <!-- Right hand -->
    <ellipse cx="97" cy="79" rx="4.5" ry="3" fill="#e2cfa8" transform="rotate(-15,97,79)"/>

    <!-- Head -->
    <rect x="7" y="50" width="30" height="28" rx="5" fill="url(#li-body)" stroke="#c0b090" stroke-width=".7"/>
    <rect x="18" y="77" width="8"  height="3"  rx="1.5" fill="#d8c5a5"/>
    <circle cx="16" cy="62" r="2.2" fill="#222"/>
    <circle cx="28" cy="62" r="2.2" fill="#222"/>
    <circle cx="15.3" cy="61.3" r=".7" fill="#fff" opacity=".8"/>
    <circle cx="27.3" cy="61.3" r=".7" fill="#fff" opacity=".8"/>
    <path d="M13 58 Q16 56.5 19 58"  stroke="#444" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M25 58 Q28 56.5 31 58"  stroke="#444" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M14 69.5 Q22 76 30 69.5" stroke="#555" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="12" cy="66" r="3" fill="#ff9090" opacity=".3"/>
    <circle cx="31" cy="66" r="3" fill="#ff9090" opacity=".3"/>
  </g>

  <!-- ═══ PROFILE PICTURE PLACEHOLDER (bottom-left) ═══ -->
  <!-- LinkedIn overlaps a circular profile pic at roughly this position on the banner -->
  <circle cx="192" cy="330" r="82" fill="url(#li-hatch)" stroke="#2e4060" stroke-width="2.5" stroke-dasharray="9,5"/>
  <text x="192" y="330" text-anchor="middle" dominant-baseline="middle"
        font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#4a6080" opacity=".9">Profil Fotoğrafı</text>

  <!-- Arrow from profile picture to name -->
  <path d="M 270 290 C 330 245, 390 210, 480 190"
        fill="none" stroke="#e85d04" stroke-width="2.8"
        stroke-linecap="round" stroke-dasharray="8,5"
        marker-end="url(#li-arrow)" opacity=".9"/>

  <!-- ═══ TEXT SECTION ═══ -->
  <!-- Name -->
  <text x="510" y="168"
        font-family="'Segoe UI',Arial Black,sans-serif"
        font-size="74" font-weight="800"
        letter-spacing="3" fill="#ffffff"
        filter="url(#li-glow)">Mazlum BAYDAR</text>

  <!-- Accent separator bar -->
  <rect x="510" y="182" width="560" height="4" rx="2" fill="url(#li-accent)" opacity=".9"/>

  <!-- Title line 1 -->
  <text x="510" y="234"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="33" font-weight="600"
        letter-spacing="1.2" fill="#e85d04">Sr. Threat Intelligence and</text>

  <!-- Title line 2 -->
  <text x="510" y="278"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="33" font-weight="600"
        letter-spacing="1.2" fill="#f48c06">Detection Engineer</text>

  <!-- Subtle horizontal rule below title -->
  <line x1="510" y1="300" x2="1060" y2="300" stroke="#1e2d45" stroke-width="1" opacity=".7"/>

  <!-- Small TI-DE brand mark bottom-right of text area -->
  <text x="510" y="335"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="13" font-weight="400"
        letter-spacing="3" fill="#4a6080" opacity=".7">THREAT INTELLIGENCE · DETECTION ENGINEERING</text>

  <!-- Left edge accent bar -->
  <rect x="0" y="0" width="5" height="396" fill="url(#li-accent)" opacity=".7"/>
</svg>
