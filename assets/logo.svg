<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0d1f35"/>
      <stop offset="100%" style="stop-color:#050d1a"/>
    </radialGradient>
    <radialGradient id="irisGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00c8ff"/>
      <stop offset="60%" style="stop-color:#0077cc"/>
      <stop offset="100%" style="stop-color:#003d7a"/>
    </radialGradient>
    <radialGradient id="pupilGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="100%" style="stop-color:#000"/>
    </radialGradient>
    <linearGradient id="signalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00c8ff"/>
    </linearGradient>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="96"/>
    </clipPath>
  </defs>

  <!-- Outer circle background -->
  <circle cx="100" cy="100" r="98" fill="url(#bgGrad)"/>
  <circle cx="100" cy="100" r="98" fill="none" stroke="#0077cc" stroke-width="1" opacity="0.4"/>

  <!-- Radar rings (concentric, fading) -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#0077cc" stroke-width="0.5" opacity="0.2"/>
  <circle cx="100" cy="100" r="74" fill="none" stroke="#0077cc" stroke-width="0.5" opacity="0.25"/>
  <circle cx="100" cy="100" r="60" fill="none" stroke="#0077cc" stroke-width="0.6" opacity="0.3"/>
  <circle cx="100" cy="100" r="46" fill="none" stroke="#00c8ff" stroke-width="0.6" opacity="0.35"/>

  <!-- Radar sweep line -->
  <line x1="100" y1="100" x2="100" y2="14" stroke="url(#signalGrad)" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="100" x2="168" y2="54" stroke="url(#signalGrad)" stroke-width="0.6" opacity="0.15"/>

  <!-- Cross-hair lines (fine) -->
  <line x1="100" y1="4" x2="100" y2="196" stroke="#0077cc" stroke-width="0.4" opacity="0.15"/>
  <line x1="4" y1="100" x2="196" y2="100" stroke="#0077cc" stroke-width="0.4" opacity="0.15"/>

  <!-- Hex grid pattern (clipped to circle, suggesting honeycomb compound eye) -->
  <!-- Row 1 -->
  <polygon points="100,52 108,56 108,64 100,68 92,64 92,56" fill="none" stroke="#00c8ff" stroke-width="0.7" opacity="0.35"/>
  <!-- Row 2 left -->
  <polygon points="84,60 92,64 92,72 84,76 76,72 76,64" fill="none" stroke="#00c8ff" stroke-width="0.7" opacity="0.25"/>
  <!-- Row 2 right -->
  <polygon points="116,60 124,64 124,72 116,76 108,72 108,64" fill="none" stroke="#00c8ff" stroke-width="0.7" opacity="0.25"/>

  <!-- Main eye shape (eyelid path) -->
  <path d="M30 100 Q60 58 100 56 Q140 58 170 100 Q140 142 100 144 Q60 142 30 100 Z"
        fill="#050d1a" stroke="#00c8ff" stroke-width="1.5" filter="url(#outerGlow)" opacity="0.95"/>

  <!-- Eye white / sclera -->
  <path d="M38 100 Q65 66 100 64 Q135 66 162 100 Q135 134 100 136 Q65 134 38 100 Z"
        fill="#061220" opacity="1"/>

  <!-- Iris -->
  <circle cx="100" cy="100" r="30" fill="url(#irisGrad)" filter="url(#innerGlow)"/>

  <!-- Iris hex segments -->
  <circle cx="100" cy="100" r="30" fill="none" stroke="#003d7a" stroke-width="8" stroke-dasharray="3 4" opacity="0.5"/>
  <circle cx="100" cy="100" r="22" fill="none" stroke="#0066aa" stroke-width="1" opacity="0.4"/>

  <!-- Iris circuit detail -->
  <line x1="82" y1="92" x2="88" y2="92" stroke="#00c8ff" stroke-width="0.8" opacity="0.7"/>
  <line x1="112" y1="92" x2="118" y2="92" stroke="#00c8ff" stroke-width="0.8" opacity="0.7"/>
  <line x1="82" y1="108" x2="88" y2="108" stroke="#00c8ff" stroke-width="0.8" opacity="0.7"/>
  <line x1="112" y1="108" x2="118" y2="108" stroke="#00c8ff" stroke-width="0.8" opacity="0.7"/>

  <!-- Pupil -->
  <circle cx="100" cy="100" r="13" fill="url(#pupilGrad)"/>

  <!-- Pupil crosshair -->
  <line x1="100" y1="90" x2="100" y2="110" stroke="#00ff88" stroke-width="0.8" opacity="0.8" filter="url(#softGlow)"/>
  <line x1="90" y1="100" x2="110" y2="100" stroke="#00ff88" stroke-width="0.8" opacity="0.8" filter="url(#softGlow)"/>
  <circle cx="100" cy="100" r="3" fill="none" stroke="#00ff88" stroke-width="0.8" opacity="0.9" filter="url(#softGlow)"/>

  <!-- Specular highlight on iris -->
  <ellipse cx="91" cy="91" rx="6" ry="4" fill="white" opacity="0.1" transform="rotate(-30 91 91)"/>

  <!-- Signal dots on eyelid edge -->
  <circle cx="30" cy="100" r="2" fill="#00c8ff" opacity="0.6" filter="url(#softGlow)"/>
  <circle cx="170" cy="100" r="2" fill="#00c8ff" opacity="0.6" filter="url(#softGlow)"/>
  <circle cx="100" cy="56" r="2" fill="#00ff88" opacity="0.7" filter="url(#softGlow)"/>
  <circle cx="100" cy="144" r="2" fill="#00ff88" opacity="0.7" filter="url(#softGlow)"/>

  <!-- Corner tick marks -->
  <line x1="14" y1="100" x2="22" y2="100" stroke="#00c8ff" stroke-width="1" opacity="0.5"/>
  <line x1="178" y1="100" x2="186" y2="100" stroke="#00c8ff" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="14" x2="100" y2="22" stroke="#00c8ff" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="178" x2="100" y2="186" stroke="#00c8ff" stroke-width="1" opacity="0.5"/>

  <!-- Outer ring glow pulse -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#00c8ff" stroke-width="0.8" opacity="0.25" filter="url(#softGlow)"/>
</svg>
